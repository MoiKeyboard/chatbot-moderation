
name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build development image
      run: |
        docker build -t chatbot-dev -f docker/Dockerfile.dev .

    - name: Run tests
      run: |
        docker run --rm chatbot-dev pytest tests/

    - name: Run linting
      run: |
        docker run --rm chatbot-dev ruff check src/ tests/
        docker run --rm chatbot-dev mypy -p src

    - name: Build production image
      run: |
        docker build -t chatbot-prod -f docker/Dockerfile.prod .
