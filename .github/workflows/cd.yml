name: CD

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'docker/**'
      - 'requirements.txt'
      - '.github/workflows/cd.yml'
  workflow_dispatch:
    inputs:
      force_app_deployment:
        description: 'Force Chatbot App Deployment'
        required: false
        type: boolean
        default: false
      force_ai_deployment:
        description: 'Force AI Service Deployment'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: eu.gcr.io # Amsterdam (Europe)
  REGION: europe-west4 # Amsterdam
  PROJECT_ID: moikeyboard-chatbot # GCP Project ID
  FIRESTORE_DB_NAME: chatbot-db # Firestore Database Name
  SERVICE_NAME: chatbot-moderation # Default Service Name (App)
  # App Configuration

  VERTEX_LOCATION: europe-west4
  # Logging
  LOG_LEVEL: INFO

jobs:
  # Job 1: Filter Changes
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      ai: ${{ steps.filter.outputs.ai }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          app:
            - 'src/**'
            - '!src/ai_service/**'
            - 'docker/Dockerfile'
            - 'requirements.txt'
          ai:
            - 'src/ai_service/**'
            - 'docker/Dockerfile.ai'

  # Job 2: Deploy Chatbot (Lightweight)
  deploy-app:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' || inputs.force_app_deployment == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
    - uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
        token_format: 'access_token'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 'Docker Login'
      uses: 'docker/login-action@v3'
      with:
        registry: ${{ env.REGISTRY }}
        username: 'oauth2accesstoken'
        password: '${{ steps.auth.outputs.access_token }}'

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}
        tags: |
          type=raw,value=${{ github.sha }}
          type=raw,value=latest

    - name: Build and Push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile
        target: prod
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Deploy to Cloud Run
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: ${{ env.SERVICE_NAME }}
        image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        region: ${{ env.REGION }}
        flags: '--allow-unauthenticated'
        env_vars: |
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_TELEGRAM_ID=${{ secrets.ADMIN_TELEGRAM_ID }}
          GCP_PROJECT_ID=${{ env.PROJECT_ID }}
          FIRESTORE_DB_NAME=${{ env.FIRESTORE_DB_NAME }}
          HUGGINGFACE_API_TOKEN=${{ secrets.HUGGINGFACE_API_TOKEN }}
          PUBLIC_URL=${{ vars.PUBLIC_URL }}
          LOG_LEVEL=${{ env.LOG_LEVEL }}
          AI_PROVIDER=${{ vars.AI_PROVIDER }}
          VERTEX_PROJECT_ID=${{ env.PROJECT_ID }}
          VERTEX_LOCATION=${{ env.VERTEX_LOCATION }}
          AI_SERVICE_URL=${{ vars.AI_SERVICE_URL }} 

  # Job 3: Deploy AI Service (Heavy)
  deploy-ai:
    needs: changes
    if: ${{ needs.changes.outputs.ai == 'true' || inputs.force_ai_deployment == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      SERVICE_NAME: lionguard-service

    steps:
    - uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
        token_format: 'access_token'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 'Docker Login'
      uses: 'docker/login-action@v3'
      with:
        registry: ${{ env.REGISTRY }}
        username: 'oauth2accesstoken'
        password: '${{ steps.auth.outputs.access_token }}'

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}
        tags: |
          type=raw,value=${{ github.sha }}
          type=raw,value=v1
          type=raw,value=latest

    - name: Build and Push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile.ai
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to Cloud Run
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: ${{ env.SERVICE_NAME }}
        image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        region: ${{ env.REGION }}
        flags: '--allow-unauthenticated --memory=4Gi --cpu=2'
        env_vars: |
          HF_TOKEN=${{ secrets.HUGGINGFACE_API_TOKEN }}
