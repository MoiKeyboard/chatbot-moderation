name: CD

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'docker/**'
      - 'requirements.txt'
      - '.github/workflows/cd.yml'

env:
  REGISTRY: eu.gcr.io # Amsterdam (Europe)
  SERVICE_NAME: chatbot-moderation
  REGION: europe-west4 # Amsterdam
  PROJECT_ID: moikeyboard-chatbot # GCP Project ID

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
    - uses: actions/checkout@v4

    # 1. Authenticate to Google Cloud
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
        token_format: 'access_token'

    # 2. Login to Docker Registry
    - name: 'Docker Login'
      uses: 'docker/login-action@v3'
      with:
        registry: ${{ env.REGISTRY }}
        username: 'oauth2accesstoken'
        password: '${{ steps.auth.outputs.access_token }}'

    # 3. Extract Metadata
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}
        tags: |
          type=raw,value=${{ github.sha }}
          type=raw,value=latest

    # 4. Build and Push Container
    - name: Build and Push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile
        target: prod
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    # 5. Deploy to Cloud Run
    - name: Deploy to Cloud Run
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: ${{ env.SERVICE_NAME }}
        image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        region: ${{ env.REGION }}
        flags: '--allow-unauthenticated'
        env_vars: |
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_TELEGRAM_ID=${{ secrets.ADMIN_TELEGRAM_ID }}
          GCP_PROJECT_ID=${{ env.PROJECT_ID }}
          HUGGINGFACE_API_TOKEN=${{ secrets.HUGGINGFACE_API_TOKEN }}
          LOG_LEVEL=INFO
          FIRESTORE_EMULATOR_HOST=
